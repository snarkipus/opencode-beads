name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Test
        run: bun test

      - name: Test vendor sync
        run: ./scripts/test-sync-beads.sh

      - name: Validate vendor content
        run: bun run test:vendor

      - name: Typecheck
        run: bun run typecheck

      - name: Test packed package
        run: bun run test:package
