name: release

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun test

      - name: Validate vendor content
        run: bun run test:vendor

      - name: Test vendor sync
        run: ./scripts/test-sync-beads.sh

      - name: Test packed package
        run: bun run test:package

      - name: Validate and build release archive
        id: package
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: bun scripts/release.ts prepare --tag "$RELEASE_TAG" --output release-artifacts

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: ${{ steps.package.outputs.archive }}

      - name: Upload release assets to GitHub
        env:
          ARCHIVE: ${{ steps.package.outputs.archive }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: gh release upload "$RELEASE_TAG" "$ARCHIVE"

      # npm still needed for trusted publishing, see:
      # https://github.com/oven-sh/bun/issues/15601
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Install trusted-publishing capable npm
        run: npm install --global npm@11.10.1

      - name: Publish to npm
        env:
          ARCHIVE: ${{ steps.package.outputs.archive }}
          ARCHIVE_SHA256: ${{ steps.package.outputs.sha256 }}
          # Optional first-publication bootstrap credential. Remove the environment
          # secret after configuring this workflow as the npm trusted publisher.
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          bun scripts/release.ts verify --archive "$ARCHIVE" --sha256 "$ARCHIVE_SHA256"
          npm publish "$ARCHIVE" --access public
